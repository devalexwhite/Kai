services:
  app:
    build: .
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - db-data:/var/www/html/database
      - sessions:/tmp/php-sessions
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    networks:
      - internal
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/var/www/html/public:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file: .env
    depends_on:
      app:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  db-data:
  sessions:
  caddy-data:
  caddy-config:
